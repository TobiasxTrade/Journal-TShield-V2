<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>T-Shield Edición Fénix - Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07090f; --panel:#101522; --text:#eaf0ff; --muted:#96a3c4;
      --gold:#d5b15b; --gold-2:#f0cf82; --green:#16c56d; --green-2:#4be08f;
      --red:#ef4444; --red-2:#ff7b7b; --yellow:#f4c84f; --blue:#67a5ff; --purple:#9f7aea;
      --shadow:0 18px 50px rgba(0,0,0,.35); --radius:20px; --line:rgba(255,255,255,.07);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top left, rgba(213,177,91,.08), transparent 28%),radial-gradient(circle at bottom right, rgba(103,165,255,.07), transparent 26%),linear-gradient(180deg,#05070b,#0a0e15 45%,#080b12);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.14;background-image:linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center, black, transparent 85%)}
    .container{max-width:1420px;margin:0 auto;padding:16px}
    .topbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);background:rgba(7,9,15,.88);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1420px;margin:0 auto;padding:14px 16px;display:grid;grid-template-columns:minmax(260px,1fr) minmax(0,1.5fr);gap:14px;align-items:start}
    .brand-wrap{display:flex;flex-direction:column;gap:12px}
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .brand-mark{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg, rgba(213,177,91,.18), rgba(213,177,91,.06));border:1px solid rgba(213,177,91,.22);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 12px 30px rgba(213,177,91,.12);font-size:22px;color:var(--gold-2);flex:0 0 auto}
    .brand h1{font-family:Cinzel,serif;font-size:20px;letter-spacing:.03em;color:var(--gold-2);line-height:1.15}
    .brand p{font-family:JetBrains Mono,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:3px}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .top-stats{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:10px;min-width:0}
    .top-stat{background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow);min-width:0;overflow:hidden}
    .top-stat .label{font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.11em;color:var(--muted);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-stat .value{font-size:clamp(16px,2.1vw,22px);font-weight:800;margin-top:6px;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .value.green{color:var(--green-2)} .value.red{color:var(--red-2)} .value.gold{color:var(--gold-2)} .value.blue{color:var(--blue)}
    .primary-btn,.ghost-btn,.danger-btn,.toggle-btn,.mini-btn{border:none;cursor:pointer;transition:.2s ease;border-radius:14px;padding:11px 14px;font-weight:700;font-size:14px}
    .primary-btn{background:linear-gradient(135deg, rgba(213,177,91,.24), rgba(213,177,91,.12));color:var(--gold-2);border:1px solid rgba(213,177,91,.26)}

    .ghost-btn,.mini-btn{background:rgba(255,255,255,.03);color:var(--text);border:1px solid rgba(255,255,255,.08)}
    .danger-btn{background:rgba(240,82,82,.12);color:var(--red-2);border:1px solid rgba(240,82,82,.22)}
    .hero{margin:18px 0 16px;display:grid;grid-template-columns:1fr;gap:18px}

    .grid-main{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(280px,.75fr);gap:16px;align-items:start}

    .entry-card.win::before{background:var(--green)} .entry-card.loss::before{background:var(--red)} .entry-card.be::before{background:var(--yellow)} .entry-card.notr::before{background:var(--blue)}

    .pill{padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
    .pill.buy{color:#b6ffd7;border-color:rgba(31,201,121,.25);background:rgba(31,201,121,.10)}
    .pill.sell{color:#ffc0c0;border-color:rgba(240,82,82,.25);background:rgba(240,82,82,.10)}
    .pill.trade{color:var(--gold-2);border-color:rgba(213,177,91,.22);background:rgba(213,177,91,.08)}
    .pill.notr{color:#bdd6ff;border-color:rgba(103,165,255,.24);background:rgba(103,165,255,.10)}
    .entry-date{font-family:JetBrains Mono,monospace;font-size:12px;color:var(--muted)}
    .entry-pnl{margin-left:auto;font-weight:800;font-size:22px;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis}
    .entry-pnl.pos{color:var(--green-2)} .entry-pnl.neg{color:var(--red-2)} .entry-pnl.neutral{color:var(--yellow)}
    .entry-note{font-size:14px;color:#d6def6;line-height:1.6}
    .mini-tags{display:flex;gap:8px;flex-wrap:wrap}.tag{font-size:11px;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.06)}
    .stack{display:grid;gap:16px}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{background:rgba(255,255,255,.03);border:1px solid var(--line);padding:14px;border-radius:16px}.metric .label{font-size:12px;color:var(--muted)} .metric .value{font-size:24px;font-weight:800;margin-top:4px}
    .bars{display:grid;gap:10px}.bar-wrap{display:grid;gap:6px}.bar-top{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted)}.bar-track{height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg, rgba(240,82,82,.9), rgba(244,200,79,.95), rgba(31,201,121,.95))}
    .streak{display:flex;gap:8px;flex-wrap:wrap}.dot{width:28px;height:28px;border-radius:10px;display:grid;place-items:center;font-size:11px;font-weight:800}.dot.win{background:rgba(31,201,121,.18);color:#adffd2}.dot.loss{background:rgba(240,82,82,.18);color:#ffc7c7}.dot.be{background:rgba(244,200,79,.18);color:#ffeaaa}.dot.notr{background:rgba(103,165,255,.16);color:#cadfff}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.stat-card{padding:18px;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid var(--line)}.stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.stat-card .value{font-size:28px;font-weight:800;margin-top:8px}
    .calendar-wrap{padding:18px}.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}.cal-title{font-family:Cinzel,serif;color:var(--gold-2);font-size:17px}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.cal-day-name,.cal-cell{min-height:50px;border-radius:14px;display:grid;place-items:center;text-align:center}.cal-day-name{color:var(--muted);font-size:12px;font-weight:700}.cal-cell{background:rgba(255,255,255,.025);border:1px solid var(--line);cursor:pointer;transition:.18s}.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}.cal-cell.today{outline:2px solid rgba(213,177,91,.45)}.cal-cell.win{background:rgba(31,201,121,.14);color:#bbffd8}.cal-cell.loss{background:rgba(240,82,82,.14);color:#ffd0d0}.cal-cell.be{background:rgba(244,200,79,.14);color:#ffeab2}.cal-cell.notr{background:rgba(103,165,255,.14);color:#d2e3ff}
    .ftmo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.ftmo-card{background:linear-gradient(180deg, rgba(16,21,34,.98), rgba(11,15,24,.98));border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden}.ftmo-card::after{content:"";position:absolute;right:-60px;top:-60px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);pointer-events:none}.ftmo-label{font:700 10px JetBrains Mono,monospace;letter-spacing:.13em;color:var(--muted);text-transform:uppercase}.ftmo-value{font-size:34px;font-weight:800;margin-top:10px;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.ftmo-sub{font-size:12px;color:var(--muted);margin-top:8px}
    .pf-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.pf-card{border-radius:22px;overflow:hidden;background:linear-gradient(180deg, rgba(19,25,38,.98), rgba(13,18,28,.98));border:1px solid var(--line);box-shadow:var(--shadow)}.pf-card.disabled{opacity:.62;filter:saturate(.7)}
    .pf-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap}.firm-badge{padding:7px 10px;border-radius:999px;font:700 11px JetBrains Mono,monospace;letter-spacing:.08em;border:1px solid rgba(255,255,255,.08)}.pf-head-main{display:grid;gap:4px;min-width:140px}.pf-name{font-family:Cinzel,serif;font-size:15px;color:var(--text)}.pf-sub{font-size:12px;color:var(--muted)}
    .toggle-btn{margin-left:auto;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.08)}.toggle-btn.on{background:rgba(31,201,121,.10);border-color:rgba(31,201,121,.25);color:#bfffd9}.toggle-btn.off{background:rgba(240,82,82,.10);border-color:rgba(240,82,82,.22);color:#ffc7c7}.status-light{width:10px;height:10px;border-radius:50%}
    .pf-body{display:grid;gap:0}.pf-config{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}.pf-config-cell{padding:14px 16px;display:grid;gap:6px}.pf-config-cell:not(:last-child){border-right:1px solid var(--line)}.pf-config-label{font:700 10px JetBrains Mono,monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
    .pf-input,.field,textarea,select{width:100%;border:none;outline:none;background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px 13px;font-size:14px}
    select{background:#0f1523;color:#eef3ff} select option{background:#0f1523;color:#eef3ff}
    .pf-progress{padding:18px;border-bottom:1px solid var(--line);display:grid;gap:12px}.progress-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.progress-label{font:700 10px JetBrains Mono,monospace;letter-spacing:.12em;color:var(--gold-2);text-transform:uppercase}.progress-value{font-size:34px;line-height:1;font-weight:800;letter-spacing:-.02em}.scale{display:grid;grid-template-columns:55px 1fr 55px;gap:10px;align-items:center}.scale-label{font:700 11px JetBrains Mono,monospace;color:var(--muted);text-align:center}.progress-track{position:relative;height:16px;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:linear-gradient(90deg,#931d1d 0%,#ef4444 20%,#f4c84f 50%,#47d37b 78%,#14b45f 100%)}.progress-track::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.35);transform:translateX(-50%);z-index:2}.progress-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid rgba(11,14,22,.9);z-index:3;box-shadow:0 0 0 3px rgba(255,255,255,.08)}.progress-meta{font-size:13px;color:var(--muted);line-height:1.6}
    .consistency-box{padding:16px;border-bottom:1px solid var(--line);display:grid;gap:12px}.consistency-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.consistency-title{font:700 10px JetBrains Mono,monospace;letter-spacing:.12em;color:var(--gold-2);text-transform:uppercase}.consistency-badge{padding:7px 10px;border-radius:999px;font:700 11px JetBrains Mono,monospace;border:1px solid rgba(255,255,255,.08)}
    .ok{background:rgba(31,201,121,.12);color:#bcffd8;border-color:rgba(31,201,121,.22)}.warn{background:rgba(244,200,79,.12);color:#ffeaaa;border-color:rgba(244,200,79,.22)}.bad{background:rgba(240,82,82,.12);color:#ffd0d0;border-color:rgba(240,82,82,.22)}.na{background:rgba(255,255,255,.05);color:var(--muted);border-color:rgba(255,255,255,.09)}
    .consistency-meter{display:grid;gap:8px}.consistency-meter-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.consistency-track{position:relative;height:12px;border-radius:999px;overflow:hidden;background:linear-gradient(90deg,#14b45f 0%,#f4c84f 55%,#ef4444 100%);border:1px solid rgba(255,255,255,.08)}.consistency-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(0,0,0,.35)}.consistency-pointer{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid rgba(11,14,22,.9);box-shadow:0 0 0 3px rgba(255,255,255,.08)}
    .pf-add-block{padding:16px;border-bottom:1px solid var(--line);display:grid;gap:10px}.add-inline{display:grid;grid-template-columns:140px 1fr 140px auto;gap:10px}.pf-table-wrap{overflow:auto} table{width:100%;border-collapse:collapse} th,td{padding:12px 14px;text-align:left;white-space:nowrap} th{font:700 10px JetBrains Mono,monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-2);background:rgba(213,177,91,.04);border-bottom:1px solid var(--line)} td{border-bottom:1px solid rgba(255,255,255,.05);font-size:13px} tr:last-child td{border-bottom:none}
    .pf-footer{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;padding:16px;background:rgba(255,255,255,.02)}.pf-total{display:grid;gap:4px}.pf-total .big{font-size:22px;font-weight:800}.pf-total .small{font:700 10px JetBrains Mono,monospace;color:var(--muted);letter-spacing:.09em;text-transform:uppercase}
    .calc-shell{display:grid;gap:18px}.calc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.calc-title{font-family:Cinzel,serif;font-size:24px;color:var(--gold-2)}.calc-badge{font:700 11px JetBrains Mono,monospace;letter-spacing:.08em;padding:7px 12px;border-radius:999px;background:rgba(213,177,91,.10);border:1px solid rgba(213,177,91,.24);color:var(--gold-2)}
